name: Manual SQLite to Supabase Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy psycopg2-binary

      - name: Run migration
        run: |
          python migrate_to_supabase.py --postgres-url "postgresql://postgres.hlfoqhbqqmuksqnmfrgj:YourStrongAdminPass123!@aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=disable" --truncate
