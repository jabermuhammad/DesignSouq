<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Design Haat</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg" sizes="32x32">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header class="topbar">
    <a href="/" class="logo" aria-label="Design Haat Home">
        <img src="/static/images/logo-main.svg" alt="Design Haat">
    </a>
    <div class="top-actions">
        <div class="menu-wrap">
            <button class="icon-btn avatar-btn menu-toggle" type="button" aria-label="Open account menu" aria-expanded="false">
                <img src="/static/images/default-profile.svg" alt="Account">
                <span class="avatar-caret" aria-hidden="true"></span>
            </button>
            <div class="account-menu menu">
                <a href="/login">Login</a>
                <a href="/signup">Sign Up</a>
            </div>
        </div>
    </div>
</header>

<main class="container auth-shell">
    <section class="auth-card premium-card">
        <h1>Welcome Back</h1>
        <p>Login as Designer or Viewer with the same form.</p>

        {% if error %}
        <p class="auth-error">{{ error }}</p>
        {% endif %}

        <form method="post" action="/login" class="stack-form">
            <input name="identifier" placeholder="Email or Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="auth-switch">
            <p>Need a Design Haat account?</p>
            <a href="/signup" class="chip solid">Create an account</a>
        </div>

        <p class="auth-link-row"><a href="/forgot-password">Forgot password?</a></p>
        <p class="auth-link-row">Don't have an account? <a href="/signup">Create one</a></p>
    </section>
</main>

<footer class="site-footer">
    <p>&copy; Jaber Muhammad. All rights reserved.</p>
</footer>
<script src='/static/js/app.js'></script>
</body>
</html>
