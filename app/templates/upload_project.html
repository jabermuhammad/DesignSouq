<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Project</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg" sizes="32x32">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header class="topbar">
    <a href="/" class="logo" aria-label="Design Haat Home">
        <img src="/static/images/logo-main.svg" alt="Design Haat">
    </a>
    <div class="top-actions">
        {% if auth and auth.is_logged_in %}
            <a href="{{ auth.profile_url }}" class="profile-chip" title="{{ auth.name }}">
                <img src="{{ auth.avatar_url if auth.avatar_url else '/static/images/default-profile.svg' }}" alt="{{ auth.name }}">
            </a>
            <div class="menu-wrap">
                <button class="icon-btn menu-btn menu-toggle" type="button" aria-label="Open menu" aria-expanded="false">
                    <span class="menu-line"></span>
                    <span class="menu-line"></span>
                    <span class="menu-line"></span>
                </button>
                <div class="account-menu menu">
                    <a href="{{ auth.profile_url }}">My Profile</a>
                    <a href="/designer/{{ designer.id }}">Back to Profile</a>
                    <a href="/logout">Logout</a>
                </div>
            </div>
        {% endif %}
        {% if not auth or not auth.is_logged_in %}
            <div class="menu-wrap">
                <button class="icon-btn avatar-btn menu-toggle" type="button" aria-label="Open account menu" aria-expanded="false">
                    <img src="/static/images/default-profile.svg" alt="Account">
                    <span class="avatar-caret" aria-hidden="true"></span>
                </button>
                <div class="account-menu menu">
                    <a href="/login">Login</a>
                    <a href="/signup">Sign Up</a>
                </div>
            </div>
        {% endif %}
    </div>
</header>

<main class="container">
    <section class="panel upload-panel">
        <h2>{% if project %}Edit Project{% else %}Upload New Project{% endif %}</h2>
        <form method="post" enctype="multipart/form-data" action="{% if project %}/designer/{{ designer.id }}/project/{{ project.id }}/edit{% else %}/designer/{{ designer.id }}/upload{% endif %}" class="stack-form">
            <input name="title" value="{{ project.title if project else '' }}" placeholder="Project title" required>
            <textarea name="description" placeholder="Description" required>{{ project.description if project else '' }}</textarea>
            <input name="category" value="{{ project.category if project else '' }}" placeholder="Category" required>
            <input name="tags" value="{{ project.tags if project else '' }}" placeholder="Tags (comma separated)" required>
            <input type="file" name="image" accept="image/*" {% if not project %}required{% endif %}>
            <button type="submit">{% if project %}Update{% else %}Upload{% endif %}</button>
        </form>
    </section>
</main>
<footer class="site-footer">
    <p>&copy; Jaber Muhammad. All rights reserved.</p>
</footer>
<script src='/static/js/app.js'></script>
</body>
</html>
