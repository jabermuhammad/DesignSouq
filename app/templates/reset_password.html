<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Design Haat</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg" sizes="32x32">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header class="topbar">
    <a href="/" class="logo" aria-label="Design Haat Home">
        <img src="/static/images/logo-main.svg" alt="Design Haat">
    </a>
    <div class="top-actions">
        <div class="menu-wrap">
            <button class="icon-btn avatar-btn menu-toggle" type="button" aria-label="Open account menu" aria-expanded="false">
                <img src="/static/images/default-profile.svg" alt="Account">
                <span class="avatar-caret" aria-hidden="true"></span>
            </button>
            <div class="account-menu menu">
                <a href="/login">Login</a>
                <a href="/signup">Sign Up</a>
            </div>
        </div>
    </div>
</header>

<main class="container auth-shell">
    <section class="auth-card premium-card">
        <h1>Reset Password</h1>

        {% if error %}
        <p class="auth-error">{{ error }}</p>
        {% endif %}

        {% if message %}
        <p class="muted">{{ message }}</p>
        {% endif %}

        {% if valid_token %}
        <form method="post" action="/reset-password" class="stack-form">
            <input type="hidden" name="token" value="{{ token }}">
            <input name="password" type="password" placeholder="New password" minlength="8" required>
            <input name="confirm_password" type="password" placeholder="Confirm new password" minlength="8" required>
            <button type="submit">Update Password</button>
        </form>
        {% endif %}
    </section>
</main>

<footer class="site-footer">
    <p>&copy; Jaber Muhammad. All rights reserved.</p>
</footer>
<script src='/static/js/app.js'></script>
</body>
</html>
