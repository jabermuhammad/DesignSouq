<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Design Haat</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header class="topbar">
    <a href="/" class="logo">Design Haat</a>
    <div class="top-actions">
        <a href="/login" class="chip">Back to Login</a>
    </div>
</header>

<main class="container auth-shell">
    <section class="auth-card premium-card">
        <h1>Forgot Password</h1>
        <p>Enter your account email to generate a reset link.</p>

        {% if error %}
        <p class="auth-error">{{ error }}</p>
        {% endif %}

        {% if message %}
        <p class="muted">{{ message }}</p>
        {% endif %}

        {% if reset_link %}
        <p class="muted">Temporary reset link:</p>
        <p><a class="contact-link" href="{{ reset_link }}">{{ reset_link }}</a></p>
        {% endif %}

        <form method="post" action="/forgot-password" class="stack-form">
            <input name="identifier" type="email" placeholder="Email address" required>
            <button type="submit">Generate Reset Link</button>
        </form>
    </section>
</main>

<footer class="site-footer">
    <p>&copy; Jaber Muhammad. All rights reserved.</p>
</footer>
<script src='/static/js/app.js'></script>
</body>
</html>
